<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Álbum de Vida — Mis Etapas</title>

  <!-- Microsoft Authentication Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library-for-js/3.7.1/msal-browser.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --gold:        #c9a96e;
      --gold-light:  #e8c98a;
      --gold-dim:    rgba(201,169,110,.3);
      --gold-glow:   rgba(201,169,110,.45);
      --dark:        #09060333;
      --bg:          #080503;
      --wood-dark:   #120e08;
      --wood-mid:    #1c1408;
      --parchment:   #f5eada;
      --parchment-dk:#e5d0a8;
      --cream:       #faf6ed;
      --ink:         #2c1f0e;
      --ease:        cubic-bezier(.4,0,.2,1);
      --spring:      cubic-bezier(.34,1.56,.64,1);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:var(--bg); font-family:'Cormorant Garamond',serif; overflow:hidden; }
    button { cursor:pointer; font-family:inherit; }
    input, select { font-family:inherit; }

    /* ═══════════════════════════════════════════════════
       PANTALLAS
    ═══════════════════════════════════════════════════ */
    .screen { position:fixed; inset:0; transition:opacity .75s ease, transform .75s ease; }
    .screen.hidden { opacity:0; pointer-events:none; transform:scale(1.035); }

    /* Viñeta global */
    #vignette {
      position:fixed; inset:0; pointer-events:none; z-index:1;
      background:radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(0,0,0,.65) 100%);
    }

    /* Polvo flotante */
    #dust { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    #dust span {
      position:absolute; border-radius:50%;
      background:rgba(201,169,110,.55);
      animation:floatDust linear infinite;
    }
    @keyframes floatDust {
      0%  { transform:translateY(105vh) translateX(0); opacity:0; }
      8%  { opacity:1; }
      92% { opacity:.25; }
      100%{ transform:translateY(-5vh) translateX(30px); opacity:0; }
    }

    /* ═══════════════════════════════════════════════════
       PANTALLA SETUP
    ═══════════════════════════════════════════════════ */
    #screen-setup {
      background:linear-gradient(135deg,#100a04 0%,#1c1408 55%,#0a0703 100%);
      display:flex; align-items:center; justify-content:center;
      padding:1.5rem; overflow-y:auto;
    }

    .setup-card {
      width:min(660px,100%);
      background:linear-gradient(180deg,#1e1608 0%,#160f07 100%);
      border:1px solid rgba(201,169,110,.18);
      border-radius:8px;
      padding:clamp(1.8rem,5vw,3.2rem);
      box-shadow:0 40px 80px rgba(0,0,0,.75), inset 0 1px 0 rgba(201,169,110,.12);
      position:relative;
    }
    .setup-card::before {
      content:''; position:absolute; top:0; left:15%; right:15%; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }

    .setup-logo { text-align:center; margin-bottom:2rem; }
    .setup-logo h1 {
      font-family:'Playfair Display',serif; font-weight:400;
      font-size:clamp(1.8rem,4vw,2.8rem); color:var(--parchment); line-height:1.1;
    }
    .setup-logo h1 em { color:var(--gold); font-style:italic; font-weight:600; }
    .logo-rule { width:80px; height:1px; margin:.7rem auto 0; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .setup-logo p { margin-top:.55rem; font-family:'Cinzel',serif; font-size:.63rem; letter-spacing:.3em; color:rgba(201,169,110,.38); text-transform:uppercase; }

    /* Acordeón instrucciones Azure */
    .accordion {
      margin-bottom:1.8rem;
      border:1px solid rgba(201,169,110,.14);
      border-radius:4px; overflow:hidden;
    }
    .acc-trigger {
      width:100%; background:rgba(201,169,110,.07); border:none;
      padding:.85rem 1.1rem;
      display:flex; align-items:center; justify-content:space-between;
      color:var(--gold-light); font-family:'Cinzel',serif;
      font-size:.7rem; letter-spacing:.16em; text-transform:uppercase;
      transition:background .25s;
    }
    .acc-trigger:hover { background:rgba(201,169,110,.12); }
    .acc-trigger .arr { transition:transform .3s; font-size:.8rem; }
    .acc-trigger.open .arr { transform:rotate(180deg); }
    .acc-body { max-height:0; overflow:hidden; transition:max-height .4s ease; }
    .acc-body.open { max-height:600px; }
    .acc-inner { padding:.2rem 1.1rem 1.2rem; }

    .steps { counter-reset:s; list-style:none; }
    .steps li {
      counter-increment:s; display:flex; gap:.75rem; align-items:flex-start;
      padding:.5rem 0; border-bottom:1px solid rgba(201,169,110,.07);
      font-size:.88rem; color:rgba(245,234,216,.58); line-height:1.55;
    }
    .steps li:last-child { border-bottom:none; }
    .steps li::before {
      content:counter(s); flex-shrink:0; width:22px; height:22px;
      border-radius:50%; border:1px solid rgba(201,169,110,.38);
      color:var(--gold); font-family:'Cinzel',serif; font-size:.62rem;
      display:flex; align-items:center; justify-content:center; margin-top:.15rem;
    }
    .steps li strong { color:var(--gold-light); font-weight:400; }
    .steps li code {
      background:rgba(201,169,110,.1); border:1px solid rgba(201,169,110,.18);
      border-radius:3px; padding:.08rem .4rem; font-size:.8rem;
      color:var(--gold-light); font-family:monospace;
    }
    .steps li a { color:var(--gold); }

    /* Campos */
    .fields { display:flex; flex-direction:column; gap:1.1rem; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .fg { display:flex; flex-direction:column; gap:.32rem; }
    .fg label { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(201,169,110,.52); }
    .fg input, .fg select {
      background:rgba(255,255,255,.04); border:1px solid rgba(201,169,110,.18);
      border-radius:3px; color:var(--parchment); font-size:1rem;
      padding:.52rem .85rem; outline:none; width:100%;
      transition:border-color .3s;
    }
    .fg input:focus, .fg select:focus { border-color:var(--gold); }
    .fg select option { background:#1c1408; color:var(--parchment); }
    .fg .hint { font-size:.76rem; color:rgba(245,234,216,.28); font-style:italic; }

    .btn-connect {
      width:100%; margin-top:1.5rem;
      background:rgba(201,169,110,.1); border:1px solid var(--gold);
      color:var(--gold-light); font-family:'Cinzel',serif;
      font-size:.75rem; letter-spacing:.22em; text-transform:uppercase;
      padding:.82rem 1.5rem; border-radius:3px; transition:all .3s;
    }
    .btn-connect:hover:not(:disabled) { background:rgba(201,169,110,.2); }
    .btn-connect:disabled { opacity:.4; cursor:not-allowed; }

    .setup-err {
      display:none; margin-top:.8rem; padding:.65rem 1rem;
      background:rgba(180,40,40,.12); border:1px solid rgba(220,60,60,.22);
      border-radius:3px; font-size:.85rem; color:#e8a0a0; line-height:1.45;
    }
    .setup-err.show { display:block; }

    /* ═══════════════════════════════════════════════════
       PANTALLA HOME
    ═══════════════════════════════════════════════════ */
    #screen-home {
      background:
        linear-gradient(to top,rgba(6,4,2,.9) 0%,rgba(6,4,2,.28) 52%,rgba(6,4,2,.65) 100%),
        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1800&q=85')
        center/cover no-repeat;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
      padding-bottom:7vh;
    }

    .shelf-zone {
      position:absolute; top:12%; left:50%; transform:translateX(-50%);
      width:clamp(200px,36%,460px); height:62%;
      border:2px solid transparent; border-radius:3px;
      transition:border-color .4s, box-shadow .4s; outline:none;
    }
    .shelf-zone:hover, .shelf-zone:focus-visible {
      border-color:var(--gold-dim);
      box-shadow:0 0 38px 10px var(--gold-glow), inset 0 0 38px 6px rgba(201,169,110,.07);
    }
    .shelf-hint {
      position:absolute; bottom:-48px; left:50%; transform:translateX(-50%);
      font-family:'Cinzel',serif; font-size:clamp(.6rem,1.1vw,.74rem);
      letter-spacing:.28em; text-transform:uppercase; color:var(--gold-light);
      opacity:0; transition:opacity .4s; white-space:nowrap;
    }
    .shelf-zone:hover .shelf-hint, .shelf-zone:focus-visible .shelf-hint { opacity:1; }

    .home-footer { text-align:center; z-index:2; user-select:none; }
    .home-footer h1 {
      font-family:'Playfair Display',serif; font-size:clamp(2.2rem,5.5vw,3.8rem);
      font-weight:400; color:var(--parchment); letter-spacing:.05em;
      text-shadow:0 2px 32px rgba(0,0,0,.95);
    }
    .home-footer h1 em { color:var(--gold); font-style:italic; font-weight:600; }
    .home-rule { margin:.9rem auto; width:90px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .home-footer p { font-family:'Cinzel',serif; font-size:clamp(.6rem,1.1vw,.72rem); letter-spacing:.32em; color:rgba(245,234,216,.35); text-transform:uppercase; }

    /* ═══════════════════════════════════════════════════
       PANTALLA CATÁLOGO
    ═══════════════════════════════════════════════════ */
    #screen-catalog {
      background:radial-gradient(ellipse at 50% 0%,#221508 0%,#090603 65%);
      overflow-y:auto; overflow-x:hidden;
    }
    #screen-catalog::-webkit-scrollbar { width:5px; }
    #screen-catalog::-webkit-scrollbar-track { background:#050302; }
    #screen-catalog::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }

    .cat-header {
      position:sticky; top:0; z-index:20;
      background:linear-gradient(180deg,rgba(5,3,2,.97) 72%,transparent);
      padding:1.2rem 1.6rem .85rem;
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
      border-bottom:1px solid rgba(201,169,110,.12);
    }
    .btn-back {
      background:none; border:1px solid rgba(201,169,110,.28);
      color:var(--gold); font-size:.92rem; letter-spacing:.06em;
      padding:.36rem .9rem; border-radius:2px; transition:all .3s;
    }
    .btn-back:hover { background:rgba(201,169,110,.1); border-color:var(--gold); }
    .cat-title {
      font-family:'Playfair Display',serif; font-size:clamp(.92rem,2vw,1.4rem);
      font-weight:400; color:var(--parchment);
    }
    .cat-title span { color:var(--gold); font-style:italic; }
    .user-pill {
      margin-left:auto; display:flex; align-items:center; gap:.45rem;
      font-size:.76rem; color:rgba(245,234,216,.32); font-style:italic;
    }
    .user-pill::before { content:''; width:6px; height:6px; border-radius:50%; background:#5cb85c; flex-shrink:0; }
    .btn-signout {
      background:none; border:1px solid rgba(201,169,110,.13);
      color:rgba(201,169,110,.38); font-size:.75rem; letter-spacing:.06em;
      padding:.34rem .8rem; border-radius:2px; transition:all .3s;
    }
    .btn-signout:hover { color:var(--gold); border-color:rgba(201,169,110,.35); }

    /* Estantería */
    .shelf-room { padding:2.5rem clamp(1rem,5vw,4rem) 4rem; }
    .shelf-unit {
      background:linear-gradient(180deg,#1c1208 0%,#241808 50%,#141008 100%);
      border:1px solid rgba(201,169,110,.1); border-radius:5px;
      padding:2.5rem clamp(1rem,3vw,2.5rem);
      box-shadow:inset 0 2px 12px rgba(0,0,0,.7), 0 10px 40px rgba(0,0,0,.6);
      position:relative;
    }
    .shelf-unit::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:5px 5px 0 0;
    }
    .shelf-label {
      font-family:'Cinzel',serif; font-size:clamp(.56rem,.95vw,.68rem);
      letter-spacing:.28em; text-transform:uppercase;
      color:rgba(201,169,110,.36); text-align:center; margin-bottom:1.8rem;
    }
    .albums-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:clamp(.75rem,1.8vw,1.4rem); }
    .shelf-plank { margin:2rem 0; height:15px; background:linear-gradient(180deg,#3a2410 0%,#281808 50%,#180e08 100%); border-radius:2px; box-shadow:0 5px 16px rgba(0,0,0,.6),inset 0 1px 0 rgba(201,169,110,.07); }

    /* Estado de carga */
    .loading-state { text-align:center; padding:4rem 1rem; }
    .loading-state p { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.25em; color:rgba(201,169,110,.38); text-transform:uppercase; margin-top:1rem; }
    .spinner { width:34px; height:34px; border:2px solid rgba(201,169,110,.12); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ═══════════════════════════════════════════════════
       TARJETAS ÁLBUM
    ═══════════════════════════════════════════════════ */
    @keyframes riseIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .album-card { opacity:0; animation:riseIn .5s ease forwards; display:flex; flex-direction:column; align-items:center; gap:.52rem; outline:none; }

    .album-wrap { position:relative; width:100%; aspect-ratio:3/4; perspective:500px; }
    .album-book { width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s var(--ease); transform-origin:left center; }
    .album-card:hover .album-book, .album-card:focus-visible .album-book { transform:translateY(-12px) rotateY(-20deg) scale(1.04); }

    .album-front {
      position:absolute; inset:0; border-radius:2px 5px 5px 2px; overflow:hidden;
      box-shadow:-4px 4px 16px rgba(0,0,0,.8),inset -5px 0 10px rgba(0,0,0,.4);
    }
    .album-front img { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(.7) saturate(.8); transition:filter .4s; }
    .album-card:hover .album-front img { filter:brightness(.92) saturate(1.05); }
    .album-front::before { content:''; position:absolute; left:0;top:0;bottom:0;width:11px; background:linear-gradient(90deg,rgba(0,0,0,.65),rgba(0,0,0,.1)); z-index:1; }
    .album-front::after  { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 55%); z-index:3; pointer-events:none; }

    .album-front .placeholder-cover { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.4rem; }

    .album-badge {
      position:absolute; bottom:0;left:0;right:0;
      background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
      padding:.4rem .3rem .35rem; text-align:center; z-index:2;
    }
    .album-badge .num {
      font-family:'Playfair Display',serif; font-size:clamp(.85rem,1.8vw,1.1rem);
      font-style:italic; color:var(--gold-light); letter-spacing:.05em; display:block; line-height:1;
    }

    .album-count {
      position:absolute; top:5px;right:6px;
      background:rgba(0,0,0,.72); color:var(--gold); font-size:.58rem;
      padding:2px 5px; border-radius:8px; border:1px solid rgba(201,169,110,.22);
      z-index:4; opacity:0; transition:opacity .3s; font-family:'Cinzel',serif;
    }
    .album-card:hover .album-count { opacity:1; }

    /* Nombre editable bajo el libro */
    .album-name-wrap { width:100%; position:relative; }
    .album-name {
      font-family:'Cinzel',serif; font-size:clamp(.55rem,.95vw,.68rem);
      letter-spacing:.09em; color:rgba(245,234,216,.45); text-align:center;
      transition:color .3s; width:100%; cursor:pointer;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      display:block;
    }
    .album-card:hover .album-name { color:var(--gold-light); }
    .album-name-input {
      display:none; width:100%;
      background:rgba(201,169,110,.08); border:1px solid rgba(201,169,110,.3);
      border-radius:2px; color:var(--parchment); font-family:'Cinzel',serif;
      font-size:clamp(.55rem,.95vw,.65rem); letter-spacing:.08em;
      text-align:center; padding:.2rem .3rem; outline:none;
    }

    /* ═══════════════════════════════════════════════════
       MODAL — ÁLBUM ABIERTO
    ═══════════════════════════════════════════════════ */
    #modal-overlay {
      position:fixed; inset:0; background:rgba(3,2,1,.93);
      z-index:200; display:flex; align-items:center; justify-content:center;
      padding:1rem; opacity:0; pointer-events:none;
      transition:opacity .4s ease; backdrop-filter:blur(5px);
    }
    #modal-overlay.open { opacity:1; pointer-events:all; }

    .modal-shell { position:relative; width:min(880px,98vw); }

    .modal-topbar {
      display:flex; align-items:baseline; gap:1rem;
      padding:.4rem .3rem .85rem; flex-wrap:wrap;
    }
    .modal-stage-title {
      font-family:'Playfair Display',serif; font-size:clamp(1rem,2.5vw,1.45rem);
      font-style:italic; font-weight:600; color:var(--gold-light);
    }
    .modal-stage-sub {
      font-family:'Cormorant Garamond',serif; font-size:clamp(.8rem,1.5vw,1rem);
      font-style:italic; color:rgba(245,234,216,.38);
    }
    .modal-photo-count {
      font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.2em;
      color:rgba(201,169,110,.38); margin-left:auto;
    }
    .btn-modal-close {
      background:none; border:none; color:rgba(201,169,110,.45);
      font-size:1.3rem; line-height:1; padding:.3rem;
      transition:color .2s, transform .2s;
    }
    .btn-modal-close:hover { color:var(--gold-light); transform:scale(1.2) rotate(6deg); }

    /* ─── EL LIBRO ─── */
    .book-3d {
      width:100%; height:min(570px,80vh);
      position:relative; perspective:1800px;
    }

    .page-static {
      position:absolute; top:0; bottom:0; width:50%;
      overflow:hidden;
    }
    .page-static.left  { left:0;  border-radius:4px 0 0 4px; background:var(--parchment-dk); background-image:linear-gradient(to right,rgba(0,0,0,.08) 0%,transparent 12%); box-shadow:inset -6px 0 14px rgba(0,0,0,.22); }
    .page-static.right { right:0; border-radius:0 6px 6px 0; background:var(--cream); background-image:linear-gradient(to left,rgba(0,0,0,.04) 0%,transparent 12%),repeating-linear-gradient(transparent,transparent 31px,rgba(44,31,14,.055) 31px,rgba(44,31,14,.055) 32px); }

    .spine-shadow { position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%); width:30px; z-index:5; pointer-events:none; background:linear-gradient(90deg,rgba(0,0,0,.3),rgba(0,0,0,.04),rgba(0,0,0,.28)); }
    .book-3d::after { content:''; position:absolute; inset:0; pointer-events:none; z-index:1; box-shadow:0 40px 80px rgba(0,0,0,.8),0 0 0 1px rgba(201,169,110,.12); border-radius:4px 6px 6px 4px; }

    /* Contenido de página */
    .p-content { width:100%; height:100%; display:flex; align-items:center; justify-content:center; position:relative; }
    .p-content img { width:100%; height:100%; object-fit:cover; display:block; user-select:none; pointer-events:none; }
    .p-caption {
      position:absolute; bottom:0;left:0;right:0;
      background:linear-gradient(to top,rgba(44,31,14,.82),transparent);
      padding:1.5rem .8rem .6rem; text-align:center;
      font-family:'Cormorant Garamond',serif; font-size:clamp(.68rem,1.3vw,.82rem);
      font-style:italic; color:rgba(245,234,216,.88); letter-spacing:.04em;
      pointer-events:none;
    }

    /* Portada interior */
    .cover-page {
      width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:linear-gradient(135deg,#1a1008 0%,#2c1c0a 100%);
      gap:.7rem; padding:2rem;
    }
    .cover-page .c-num  { font-family:'Playfair Display',serif; font-size:clamp(4rem,12vw,7rem); color:var(--gold); font-style:italic; line-height:1; }
    .cover-page .c-rule { width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .cover-page .c-name { font-family:'Cormorant Garamond',serif; font-size:clamp(.85rem,1.6vw,1.1rem); color:rgba(245,234,216,.5); font-style:italic; text-align:center; letter-spacing:.05em; }
    .cover-page .c-count { font-family:'Cinzel',serif; font-size:clamp(.52rem,1vw,.64rem); letter-spacing:.18em; color:rgba(201,169,110,.28); text-transform:uppercase; }

    /* Página vacía */
    .empty-page { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; color:rgba(44,31,14,.25); font-style:italic; font-size:.9rem; letter-spacing:.06em; }

    /* ═══════════════════════════════════════════════════
       PAGE FLIP 3D — ELEMENTO PRINCIPAL
       El flipper simula la hoja que gira de una página
       a la otra usando rotateY y backface-visibility.
    ═══════════════════════════════════════════════════ */
    .flipper {
      position:absolute; top:0; height:100%; width:50%;
      transform-style:preserve-3d; z-index:10; pointer-events:none;
    }
    .flipper.from-right { right:0; transform-origin:left center; }
    .flipper.from-left  { left:0;  transform-origin:right center; }

    .fp-face { position:absolute; inset:0; backface-visibility:hidden; overflow:hidden; }
    .fp-front { transform:rotateY(0deg); }
    .fp-back  { transform:rotateY(180deg); }

    /* Corrección espejo para la cara trasera */
    .fp-back .p-content img    { transform:scaleX(-1); }
    .fp-back .p-caption        { transform:scaleX(-1); }
    .fp-back .cover-page       { transform:scaleX(-1); }
    .fp-back .empty-page       { transform:scaleX(-1); }

    /* Esquinas de cada cara según dirección del flip */
    .flipper.from-right .fp-front { border-radius:0 6px 6px 0; }
    .flipper.from-right .fp-back  { border-radius:4px 0 0 4px; background:var(--parchment-dk); }
    .flipper.from-left  .fp-front { border-radius:4px 0 0 4px; background:var(--parchment-dk); }
    .flipper.from-left  .fp-back  { border-radius:0 6px 6px 0; }

    /* Sombra dinámica de la página que gira */
    .flipper::after { content:''; position:absolute; inset:0; pointer-events:none; background:linear-gradient(90deg,rgba(0,0,0,.18),transparent); z-index:2; }

    /* Keyframes */
    @keyframes flipRTL { from{transform:rotateY(0deg)} to{transform:rotateY(-180deg)} }
    @keyframes flipLTR { from{transform:rotateY(-180deg)} to{transform:rotateY(0deg)} }
    .flipper.go-rtl { animation:flipRTL .65s cubic-bezier(.645,.045,.355,1) forwards; }
    .flipper.go-ltr { animation:flipLTR .65s cubic-bezier(.645,.045,.355,1) forwards; }

    /* ─── Controles ─── */
    .modal-controls { display:flex; align-items:center; justify-content:center; gap:1.4rem; padding:.85rem 0 .15rem; }
    .nav-btn {
      background:none; border:1px solid rgba(201,169,110,.26); color:var(--gold);
      font-size:1.2rem; width:42px; height:42px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; transition:all .25s;
    }
    .nav-btn:hover:not(:disabled) { background:rgba(201,169,110,.1); border-color:var(--gold); transform:scale(1.1); }
    .nav-btn:disabled { opacity:.2; cursor:not-allowed; }
    .nav-info { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.2em; color:rgba(201,169,110,.42); min-width:90px; text-align:center; }
    .key-hint { text-align:center; padding:.35rem; font-family:'Cinzel',serif; font-size:.52rem; letter-spacing:.2em; color:rgba(201,169,110,.2); text-transform:uppercase; }

    /* ═══════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════ */
    @media(max-width:560px){
      .row2,.row3 { grid-template-columns:1fr; }
      .book-3d { height:min(480px,74vh); }
      .cover-page .c-num { font-size:3rem; }
    }
  </style>
</head>
<body>

<div id="vignette" aria-hidden="true"></div>
<div id="dust" aria-hidden="true"></div>

<!-- ═══════════════════════════════════════════════════════
     PANTALLA 0 — SETUP
═══════════════════════════════════════════════════════ -->
<section id="screen-setup" class="screen" aria-label="Conectando">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1.5rem;">
    <div style="font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);color:var(--gold);font-style:italic;letter-spacing:.04em;">Mis Etapas</div>
    <div style="width:36px;height:36px;border:2px solid rgba(201,169,110,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;"></div>
    <div style="font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.28em;color:rgba(201,169,110,.38);text-transform:uppercase;">Conectando con OneDrive…</div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════
     PANTALLA 1 — HABITACIÓN
═══════════════════════════════════════════════════════ -->
<section id="screen-home" class="screen hidden">
  <div class="shelf-zone" id="shelf-trigger" role="button" tabindex="0" aria-label="Abrir mis etapas">
    <span class="shelf-hint" id="home-hint">✦ &nbsp; Mis Etapas &nbsp; ✦</span>
  </div>
  <footer class="home-footer">
    <h1 id="home-title">Mis <em>Etapas</em></h1>
    <div class="home-rule"></div>
    <p id="home-sub">Álbum de vida · Recuerdos atesorados</p>
  </footer>
</section>

<!-- ═══════════════════════════════════════════════════════
     PANTALLA 2 — CATÁLOGO
═══════════════════════════════════════════════════════ -->
<section id="screen-catalog" class="screen hidden">
  <header class="cat-header">
    <button class="btn-back" id="btn-back">← Regresar</button>
    <h2 class="cat-title">Mis <span>Etapas</span></h2>
    <div class="user-pill" id="user-pill"></div>
    <button class="btn-signout" id="btn-signout">Cerrar sesión</button>
  </header>
  <div class="shelf-room">
    <div class="shelf-unit">
      <p class="shelf-label" id="shelf-label">Cargando etapas…</p>
      <div class="albums-grid" id="grid-1"></div>
      <div class="shelf-plank" id="plank-2" style="display:none" role="separator" aria-hidden="true"></div>
      <p class="shelf-label" id="shelf-label-2" style="display:none"></p>
      <div class="albums-grid" id="grid-2" style="display:none"></div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════
     MODAL ÁLBUM
═══════════════════════════════════════════════════════ -->
<div id="modal-overlay" role="dialog" aria-modal="true" aria-label="Visor de etapa">
  <div class="modal-shell">

    <div class="modal-topbar">
      <span class="modal-stage-title" id="m-title"></span>
      <span class="modal-stage-sub"   id="m-sub"></span>
      <span class="modal-photo-count" id="m-count"></span>
      <button class="btn-modal-close" id="btn-close" aria-label="Cerrar">✕</button>
    </div>

    <div class="book-3d" id="book-3d">
      <div class="page-static left"  id="page-l"></div>
      <div class="page-static right" id="page-r"></div>
      <div class="spine-shadow" aria-hidden="true"></div>
    </div>

    <div class="modal-controls">
      <button class="nav-btn" id="nav-prev" aria-label="Página anterior">‹</button>
      <span   class="nav-info" id="nav-info">1 / 1</span>
      <button class="nav-btn" id="nav-next" aria-label="Página siguiente">›</button>
    </div>
    <p class="key-hint">Teclas ← → para pasar páginas · Esc para cerrar</p>

  </div>
</div>


<script>
/* ═══════════════════════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════════════════════ */
let msalApp    = null;
let msToken    = null;
let msUser     = null;

const cfg = {
  clientId:   'f8cdef31-a31e-4b4a-93e4-5f571e91255a',
  folder:     'Mis Etapas',
  sort:       'date',
  personName: '',
};

/*
  stages: Map<number, {
    id:      string,          // id del item de OneDrive
    rawName: string,          // nombre original de la carpeta
    label:   string,          // nombre personalizado (editable)
    photos:  [{url,name,date}],
    loaded:  bool
  }>
*/
const stages = new Map();

/* Nombres personalizados persistidos en localStorage */
const LABEL_KEY = 'misEtapas_labels_v1';
function saveLabels(){
  const obj={};
  stages.forEach((v,k)=>{ if(v.label) obj[k]=v.label; });
  try{ localStorage.setItem(LABEL_KEY,JSON.stringify(obj)); }catch(e){}
}
function loadLabels(){
  try{ return JSON.parse(localStorage.getItem(LABEL_KEY)||'{}'); }catch(e){ return {}; }
}

/* ═══════════════════════════════════════════════════════
   POLVO
═══════════════════════════════════════════════════════ */
(function(){
  const c=document.getElementById('dust');
  for(let i=0;i<22;i++){
    const s=document.createElement('span');
    const sz=Math.random()*2.5+.8;
    s.style.cssText=`left:${Math.random()*100}%;bottom:-4px;width:${sz}px;height:${sz}px;animation-duration:${13+Math.random()*15}s;animation-delay:${Math.random()*14}s;opacity:${.1+Math.random()*.5}`;
    c.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════════════════
   NAVEGACIÓN DE PANTALLAS
═══════════════════════════════════════════════════════ */
function show(id){
  ['screen-setup','screen-home','screen-catalog'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden',s!==id);
  });
}

document.getElementById('shelf-trigger').addEventListener('click', ()=>show('screen-catalog'));
document.getElementById('shelf-trigger').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); show('screen-catalog'); }});
document.getElementById('btn-back').addEventListener('click',       ()=>show('screen-home'));
document.getElementById('btn-signout').addEventListener('click', async ()=>{
  if(msalApp&&msUser) await msalApp.logoutPopup({account:msUser}).catch(()=>{});
  stages.clear();
  location.reload();
});

/* ═══════════════════════════════════════════════════════
   CONEXIÓN MSAL / AZURE — AUTO AL CARGAR
═══════════════════════════════════════════════════════ */
async function conectar(){
  try{
    msalApp=new msal.PublicClientApplication({
      auth:{
        clientId: cfg.clientId,
        authority:'https://login.microsoftonline.com/common',
        redirectUri:window.location.href.split('?')[0].split('#')[0],
      },
      cache:{ cacheLocation:'sessionStorage', storeAuthStateInCookie:false },
    });
    await msalApp.initialize();

    /* Intentar sesión silenciosa primero (si ya hay cuenta cacheada) */
    let res;
    const accounts=msalApp.getAllAccounts();
    if(accounts.length>0){
      try{
        res=await msalApp.acquireTokenSilent({ scopes:['Files.Read','User.Read'], account:accounts[0] });
        msUser=accounts[0];
      }catch(e){ res=null; }
    }
    /* Si no hay sesión previa, abrir popup de login */
    if(!res){
      res=await msalApp.loginPopup({ scopes:['Files.Read','User.Read'] });
      msUser=res.account;
    }
    msToken=res.accessToken;

    /* Actualizar UI */
    const name=cfg.personName||msUser.name||'';
    document.getElementById('home-title').innerHTML=name
      ? `${name.split(' ')[0]}'s <em>Etapas</em>`
      : 'Mis <em>Etapas</em>';
    document.getElementById('home-sub').textContent=`Álbum de vida · ${cfg.folder}`;
    document.getElementById('home-hint').textContent=`✦   Explorar mis etapas   ✦`;
    document.getElementById('user-pill').textContent=msUser.name||msUser.username;

    show('screen-home');
    loadStageIndex();
  }catch(err){
    /* Si falla, mostrar pantalla de error mínima sin formulario */
    document.getElementById('screen-setup').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1.5rem;padding:2rem;text-align:center;">
        <div style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);font-style:italic;">Mis Etapas</div>
        <div style="font-size:1rem;color:rgba(245,234,216,.5);max-width:400px;line-height:1.6;">No se pudo conectar con Microsoft.<br><em>${err.message||err}</em></div>
        <button onclick="location.reload()" style="background:none;border:1px solid var(--gold);color:var(--gold-light);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;padding:.7rem 1.4rem;border-radius:3px;cursor:pointer;">Reintentar</button>
      </div>
    `;
  }
}

/* Arrancar conexión automáticamente cuando MSAL esté listo */
window.addEventListener('load', conectar);

/* ═══════════════════════════════════════════════════════
   MICROSOFT GRAPH
═══════════════════════════════════════════════════════ */
async function getToken(){
  if(!msalApp) return null;
  try{
    const r=await msalApp.acquireTokenSilent({ scopes:['Files.Read','User.Read'], account:msUser });
    return r.accessToken;
  }catch{
    const r=await msalApp.acquireTokenPopup({ scopes:['Files.Read','User.Read'] });
    return r.accessToken;
  }
}

async function graphGet(path){
  const token=await getToken();
  const res=await fetch(`https://graph.microsoft.com/v1.0${path}`,{
    headers:{ Authorization:`Bearer ${token}` }
  });
  if(!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
  return res.json();
}

/* ═══════════════════════════════════════════════════════
   CARGA DEL ÍNDICE DE ETAPAS
   Lee subcarpetas numéricas de la carpeta raíz y las
   ordena numéricamente (1, 2, 3…).
═══════════════════════════════════════════════════════ */
async function loadStageIndex(){
  document.getElementById('shelf-label').textContent='Cargando etapas…';
  document.getElementById('grid-1').innerHTML=`<div class="loading-state"><div class="spinner"></div><p>Leyendo tu OneDrive…</p></div>`;

  try{
    const enc=encodeURIComponent(cfg.folder);
    const data=await graphGet(`/me/drive/root:/${enc}:/children?$filter=folder ne null&$select=name,id,folder&$top=200`);

    const saved=loadLabels();

    (data.value||[])
      .filter(f=>/^\d+$/.test(f.name.trim()))
      .sort((a,b)=>parseInt(a.name)-parseInt(b.name))
      .forEach(f=>{
        const n=parseInt(f.name);
        stages.set(n,{
          id:       f.id,
          rawName:  f.name,
          label:    saved[n]||'',
          photos:   [],
          loaded:   false,
        });
      });

    buildGrid();
    /* Carga lazy de portadas */
    [...stages.keys()].forEach(n=>loadStagePhotos(n).catch(()=>{}));
  }catch(err){
    document.getElementById('shelf-label').textContent=`Error: ${err.message}`;
    document.getElementById('grid-1').innerHTML='';
  }
}

async function loadStagePhotos(num){
  const s=stages.get(num);
  if(!s||s.loaded) return;

  const data=await graphGet(
    `/me/drive/items/${s.id}/children?$select=name,file,photo,lastModifiedDateTime,@microsoft.graph.downloadUrl&$top=200&$filter=file ne null`
  );

  let photos=(data.value||[]).filter(f=>f.file&&/image\//i.test(f.file.mimeType||''));

  if(cfg.sort==='name')       photos.sort((a,b)=>a.name.localeCompare(b.name));
  else if(cfg.sort==='date')  photos.sort((a,b)=>new Date(a.lastModifiedDateTime)-new Date(b.lastModifiedDateTime));
  else                        photos.sort((a,b)=>new Date(b.lastModifiedDateTime)-new Date(a.lastModifiedDateTime));

  s.photos=photos.map(f=>({
    url:  f['@microsoft.graph.downloadUrl'],
    name: f.name.replace(/\.[^.]+$/,''),
    date: f.photo?.takenDateTime||f.lastModifiedDateTime,
  }));
  s.loaded=true;
  refreshCard(num);
}

/* ═══════════════════════════════════════════════════════
   COLORES DE LOMO
═══════════════════════════════════════════════════════ */
const SPINES=[
  ['#3d1a0a','#c17f3a'],['#0a1a3d','#6aadc1'],['#1a3d0a','#8ab86e'],
  ['#2e0a3d','#a06ec1'],['#3d2e0a','#c1a66e'],['#0a3d2e','#6ec1a0'],
  ['#3d0a1a','#c16e8a'],['#1a2e3d','#6e9ac1'],['#2a1a08','#b8944e'],
  ['#08201a','#4eb898'],['#301a30','#c17ec1'],['#0c2030','#4e98c1'],
];

function spineFor(n){ return SPINES[(n-1)%SPINES.length]; }

/* ═══════════════════════════════════════════════════════
   CALCULO AÑO REAL
═══════════════════════════════════════════════════════ */
function realYear(stageNum){
  /* Etapa 1 = primer año de vida => año nacimiento + 0 */
  return cfg.birthYear + stageNum - 1;
}

/* ═══════════════════════════════════════════════════════
   CONSTRUCCIÓN DEL GRID
═══════════════════════════════════════════════════════ */
function buildGrid(){
  const g1=document.getElementById('grid-1');
  const g2=document.getElementById('grid-2');
  const l2=document.getElementById('shelf-label-2');
  const p2=document.getElementById('plank-2');
  g1.innerHTML=''; g2.innerHTML='';

  const nums=[...stages.keys()];
  if(!nums.length){ document.getElementById('shelf-label').textContent='No se encontraron carpetas numeradas.'; return; }
  document.getElementById('shelf-label').textContent='Estante de etapas';

  const mid=Math.ceil(nums.length/2);
  nums.forEach((n,idx)=>{
    const card=makeCard(n,idx);
    if(idx<mid) g1.appendChild(card);
    else        g2.appendChild(card);
  });

  if(nums.length>mid){
    g2.style.display='grid'; l2.style.display='block'; p2.style.display='block';
    l2.textContent='Segunda estantería';
  }
}

function makeCard(num, idx){
  const s=stages.get(num);
  const [bg,accent]=spineFor(num);
  const card=document.createElement('div');
  card.className='album-card';
  card.setAttribute('role','button');
  card.setAttribute('tabindex','0');
  card.setAttribute('data-num',num);
  card.setAttribute('aria-label',`Etapa ${num}`);
  card.style.animationDelay=`${idx*.055}s`;
  card.innerHTML=cardHTML(num,s,bg,accent);

  card.addEventListener('click',e=>{
    if(e.target.classList.contains('album-name')||e.target.classList.contains('album-name-input')) return;
    openStage(num);
  });
  card.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openStage(num); }});

  /* Edición inline del nombre */
  const nameEl =card.querySelector('.album-name');
  const inputEl=card.querySelector('.album-name-input');
  nameEl.addEventListener('click',e=>{ e.stopPropagation(); startEdit(nameEl,inputEl,num); });
  inputEl.addEventListener('blur',()=>commitEdit(nameEl,inputEl,num));
  inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter') inputEl.blur(); if(e.key==='Escape'){ inputEl.value=nameEl.dataset.val; inputEl.blur(); }});

  return card;
}

function cardHTML(num,s,bg,accent){
  const cover=s.photos[0]?.url||null;
  return `
    <div class="album-wrap">
      <div class="album-book">
        <div class="album-front" style="background:${bg}">
          ${cover
            ? `<img src="${cover}" alt="Portada etapa ${num}" loading="lazy"/>`
            : `<div class="placeholder-cover">
                 <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="1" opacity="0.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
               </div>`
          }
          <div class="album-badge">
            <span class="num">${num}</span>
          </div>
          ${s.loaded&&s.photos.length>0?`<span class="album-count">${s.photos.length}</span>`:''}
        </div>
      </div>
    </div>
    <div class="album-name-wrap">
      <span class="album-name" data-val="${s.label||''}" title="Clic para editar nombre">${s.label||`Etapa ${num}`}</span>
      <input class="album-name-input" type="text" maxlength="30" value="${s.label||''}" placeholder="Nombre de la etapa…" />
    </div>
  `;
}

function refreshCard(num){
  const card=document.querySelector(`.album-card[data-num="${num}"]`);
  if(!card) return;
  const s=stages.get(num);
  const [bg,accent]=spineFor(num);
  card.innerHTML=cardHTML(num,s,bg,accent);

  const nameEl =card.querySelector('.album-name');
  const inputEl=card.querySelector('.album-name-input');
  nameEl.addEventListener('click',e=>{ e.stopPropagation(); startEdit(nameEl,inputEl,num); });
  inputEl.addEventListener('blur',()=>commitEdit(nameEl,inputEl,num));
  inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter') inputEl.blur(); if(e.key==='Escape'){ inputEl.value=nameEl.dataset.val; inputEl.blur(); }});
}

function startEdit(nameEl,inputEl,num){
  nameEl.style.display='none';
  inputEl.style.display='block';
  inputEl.focus(); inputEl.select();
}
function commitEdit(nameEl,inputEl,num){
  const val=inputEl.value.trim();
  stages.get(num).label=val;
  saveLabels();
  nameEl.textContent=val||`Etapa ${num}`;
  nameEl.dataset.val=val;
  inputEl.style.display='none';
  nameEl.style.display='block';
}

/* ═══════════════════════════════════════════════════════
   VISOR — PAGE FLIP 3D
═══════════════════════════════════════════════════════ */
const modalEl  =document.getElementById('modal-overlay');
const book3d   =document.getElementById('book-3d');
const pageL    =document.getElementById('page-l');
const pageR    =document.getElementById('page-r');
const navPrev  =document.getElementById('nav-prev');
const navNext  =document.getElementById('nav-next');
const navInfo  =document.getElementById('nav-info');

let activeNum  =null;
let spread     =0;       // 0=portada+foto0, 1=foto1+foto2, …
let flipping   =false;

function spreads(photos){ return !photos.length ? 1 : 1+Math.ceil((photos.length-1)/2); }
function spreadPhotos(photos,sp){
  if(sp===0) return [null, photos[0]||null];
  const b=(sp-1)*2+1;
  return [photos[b]||null, photos[b+1]||null];
}

async function openStage(num){
  activeNum=num; spread=0;
  const s=stages.get(num);
  if(!s.loaded){
    setTopbar(num,s); renderLoading(); modalEl.classList.add('open'); document.body.style.overflow='hidden';
    try{ await loadStagePhotos(num); }catch(e){ console.error(e); }
  }
  setTopbar(num,s);
  renderSpread();
  if(!modalEl.classList.contains('open')){ modalEl.classList.add('open'); document.body.style.overflow='hidden'; }
  document.getElementById('btn-close').focus();
}

function closeModal(){ modalEl.classList.remove('open'); document.body.style.overflow=''; }

function setTopbar(num,s){
  document.getElementById('m-title').textContent=`Etapa ${num}`;
  document.getElementById('m-sub').textContent  =s.label ? `· ${s.label}` : '';
  document.getElementById('m-count').textContent=s.loaded?`${s.photos.length} foto${s.photos.length!==1?'s':''}`:'';
}

function renderLoading(){
  pageL.innerHTML=`<div class="cover-page"><div class="spinner"></div></div>`;
  pageR.innerHTML=`<div class="empty-page"><span>Cargando fotos…</span></div>`;
}

function renderSpread(){
  const s=stages.get(activeNum);
  const p=s.photos;
  const tot=spreads(p);
  const [lp,rp]=spreadPhotos(p,spread);

  navInfo.textContent=`${spread+1} / ${tot}`;
  navPrev.disabled=spread===0;
  navNext.disabled=spread===tot-1;

  pageL.innerHTML=buildPage(lp, spread===0?'cover':null, activeNum, s);
  pageR.innerHTML=buildPage(rp, null, null, null);
}

function buildPage(photo, role, num, s){
  if(role==='cover'){
    return `<div class="cover-page">
      <span class="c-num">${num}</span>
      <div class="c-rule"></div>
      ${s.label?`<span class="c-name">${s.label}</span>`:''}
      <span class="c-count">${s.photos.length} recuerdo${s.photos.length!==1?'s':''}</span>
    </div>`;
  }
  if(!photo) return `<div class="empty-page"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Fin de la etapa</span></div>`;

  const dateStr=photo.date?new Date(photo.date).toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}):'';
  return `<div class="p-content"><img src="${photo.url}" alt="${photo.name||'Fotografía'}" loading="lazy"/><div class="p-caption">${photo.name||''}${dateStr?` · ${dateStr}`:''}</div></div>`;
}

/* PAGE FLIP */
function doFlip(dir){
  if(flipping) return;
  flipping=true;

  const s=stages.get(activeNum);
  const p=s.photos;
  const [lOld,rOld]=spreadPhotos(p,spread);
  if(dir==='next') spread++; else spread--;
  const [lNew,rNew]=spreadPhotos(p,spread);

  /* Crear flipper */
  const flipper=document.createElement('div');
  flipper.className=`flipper ${dir==='next'?'from-right':'from-left'}`;

  /* Cara frontal: página que "sale" → la derecha (next) o izquierda (prev) */
  const front=document.createElement('div');
  front.className='fp-face fp-front';
  front.innerHTML=dir==='next'
    ? buildPage(rOld,null,null,null)
    : buildPage(lOld, spread+1===0?'cover':null, activeNum, s);

  /* Cara trasera: página que "entra" → la izquierda nueva (next) o derecha nueva (prev) */
  const back=document.createElement('div');
  back.className='fp-face fp-back';
  back.innerHTML=dir==='next'
    ? buildPage(lNew, spread===0?'cover':null, activeNum, s)
    : buildPage(rNew,null,null,null);

  flipper.appendChild(front);
  flipper.appendChild(back);
  book3d.appendChild(flipper);

  /* Actualizar fondo estático al nuevo estado */
  pageL.innerHTML=buildPage(lNew, spread===0?'cover':null, activeNum, s);
  pageR.innerHTML=buildPage(rNew,null,null,null);

  /* Lanzar animación */
  requestAnimationFrame(()=>{
    flipper.classList.add(dir==='next'?'go-rtl':'go-ltr');
    flipper.addEventListener('animationend',()=>{
      book3d.removeChild(flipper);
      flipping=false;
      /* Sincronizar controles */
      const tot=spreads(p);
      navInfo.textContent=`${spread+1} / ${tot}`;
      navPrev.disabled=spread===0;
      navNext.disabled=spread===tot-1;
    },{ once:true });
  });
}

navNext.addEventListener('click',()=>{
  if(flipping) return;
  const tot=spreads(stages.get(activeNum).photos);
  if(spread<tot-1) doFlip('next');
});
navPrev.addEventListener('click',()=>{
  if(flipping) return;
  if(spread>0) doFlip('prev');
});

document.getElementById('btn-close').addEventListener('click',closeModal);
modalEl.addEventListener('click',e=>{ if(e.target===modalEl) closeModal(); });
document.addEventListener('keydown',e=>{
  if(!modalEl.classList.contains('open')) return;
  if(e.key==='Escape')      closeModal();
  if(e.key==='ArrowRight') navNext.click();
  if(e.key==='ArrowLeft')  navPrev.click();
});
</script>
