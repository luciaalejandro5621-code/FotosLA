<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Etapas — Álbum de Vida</title>

  <!-- Google APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────────────────
       TOKENS
    ──────────────────────────────────────────────── */
    :root {
      --gold:       #c9a96e;
      --gold-lt:    #e8c98a;
      --gold-dim:   rgba(201,169,110,.28);
      --bg:         #060402;
      --wood:       #100c06;
      --parchment:  #f5eada;
      --parch-dk:   #e3cfa0;
      --cream:      #faf6ed;
      --ink:        #2c1f0e;
      --ease:       cubic-bezier(.4,0,.2,1);
      --spring:     cubic-bezier(.34,1.56,.64,1);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'Cormorant Garamond',serif; }
    button { cursor:pointer; font-family:inherit; border:none; background:none; }
    input, select { font-family:inherit; }
    a { color:var(--gold); }

    @keyframes spin   { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes flare  { 0%,100%{opacity:.18} 50%{opacity:.45} }

    /* ────────────────────────────────────────────────
       PANTALLAS
    ──────────────────────────────────────────────── */
    .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .hidden { display:none !important; }

    /* ────────────────────────────────────────────────
       VIGNETTE + DUST
    ──────────────────────────────────────────────── */
    #vignette {
      pointer-events:none; position:fixed; inset:0; z-index:999;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,.85) 100%);
    }
    #dust {
      pointer-events:none; position:fixed; inset:0; z-index:998;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(201,169,110,.15) 0, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(201,169,110,.1) 0, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(201,169,110,.08) 0, transparent 100%);
      animation: flare 8s ease-in-out infinite;
    }

    /* ════════════════════════════════════════════════
       PANTALLA 0 — SETUP
    ════════════════════════════════════════════════ */
    #screen-setup {
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(30,20,5,.9) 0%, var(--bg) 100%);
      padding: 1.5rem;
      overflow-y: auto;
    }
    .setup-card {
      width: 100%; max-width: 540px;
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      padding: 2.2rem 2.4rem 2rem;
      background: rgba(20,14,4,.7);
      backdrop-filter: blur(12px);
      animation: fadeUp .6s var(--ease) both;
    }
    .setup-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .setup-logo h1 {
      font-family:'Playfair Display',serif;
      font-size: clamp(1.8rem,4vw,2.6rem);
      color: var(--gold-lt);
      font-weight:400; font-style:italic;
      letter-spacing: .04em;
    }
    .setup-logo .rule {
      width:80px; height:1px;
      background: linear-gradient(90deg,transparent,var(--gold-dim),transparent);
      margin: .7rem auto .6rem;
    }
    .setup-logo p {
      font-size:.85rem; color:rgba(245,234,216,.38);
      letter-spacing:.08em; font-style:italic;
    }

    /* Acordeón instrucciones */
    .accordion { margin-bottom:1.4rem; border:1px solid var(--gold-dim); border-radius:4px; overflow:hidden; }
    .acc-trigger {
      width:100%; display:flex; align-items:center; justify-content:space-between;
      padding:.8rem 1rem;
      background:rgba(201,169,110,.05);
      font-family:'Cinzel',serif; font-size:.68rem;
      letter-spacing:.14em; text-transform:uppercase; color:rgba(201,169,110,.7);
      transition: background .2s;
    }
    .acc-trigger:hover { background:rgba(201,169,110,.1); }
    .acc-trigger .arr { transition:transform .3s var(--ease); display:inline-block; }
    .acc-trigger.open .arr { transform:rotate(180deg); }
    .acc-body { max-height:0; overflow:hidden; transition:max-height .4s var(--ease); }
    .acc-body.open { max-height:600px; }
    .acc-inner { padding:.8rem 1rem 1rem; }
    .steps { padding-left:1.1rem; }
    .steps li {
      font-size:.88rem; color:rgba(245,234,216,.65);
      line-height:1.65; margin-bottom:.35rem;
    }
    .steps strong { color:rgba(245,234,216,.9); }
    .steps code {
      background:rgba(201,169,110,.1); padding:.1em .35em;
      border-radius:3px; font-size:.82em; color:var(--gold-lt);
    }

    /* Campos */
    .fields { display:flex; flex-direction:column; gap:1rem; margin-bottom:1.4rem; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .fg { display:flex; flex-direction:column; gap:.32rem; }
    .fg label {
      font-family:'Cinzel',serif; font-size:.62rem;
      letter-spacing:.16em; text-transform:uppercase;
      color:rgba(201,169,110,.65);
    }
    .fg input, .fg select {
      background:rgba(201,169,110,.06);
      border:1px solid var(--gold-dim);
      border-radius:3px; padding:.6rem .8rem;
      color:var(--parchment); font-size:.95rem;
      outline:none; transition:border-color .2s, background .2s;
    }
    .fg input:focus, .fg select:focus {
      border-color:rgba(201,169,110,.6);
      background:rgba(201,169,110,.1);
    }
    .fg input::placeholder { color:rgba(245,234,216,.22); }
    .fg select option { background:#1a1206; color:var(--parchment); }
    .fg .hint { font-size:.74rem; color:rgba(245,234,216,.32); line-height:1.4; }

    .btn-connect {
      width:100%; padding:1rem;
      background:linear-gradient(135deg,rgba(201,169,110,.12),rgba(201,169,110,.06));
      border:1px solid var(--gold-dim);
      border-radius:4px;
      font-family:'Cinzel',serif; font-size:.75rem;
      letter-spacing:.25em; text-transform:uppercase;
      color:var(--gold-lt);
      transition:all .3s var(--ease);
    }
    .btn-connect:hover:not(:disabled) {
      background:rgba(201,169,110,.18);
      border-color:rgba(201,169,110,.55);
      box-shadow:0 0 24px rgba(201,169,110,.1);
    }
    .btn-connect:disabled { opacity:.4; cursor:not-allowed; }

    .setup-err {
      margin-top:.8rem; font-size:.82rem;
      color:#e88; text-align:center; min-height:1.2em;
      opacity:0; transition:opacity .3s;
    }
    .setup-err.show { opacity:1; }

    /* ════════════════════════════════════════════════
       PANTALLA 1 — HOME
    ════════════════════════════════════════════════ */

      padding: 0;

    .home-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,.0) 40%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
    }
    #shelf-trigger {
      position: absolute;
      top: 4%; right: 1%; width: 40%; height: 82%;
      cursor: pointer;
      border: none; background: none;
      border-radius: 8px;
      transition: background .4s ease, box-shadow .4s ease;
    }
    #shelf-trigger::after {
      content: '📖  Ver nuestros años';
      position: absolute; bottom: 10%; left: 50%;
      transform: translateX(-50%) translateY(10px);
      font-family: 'Cinzel', serif; font-size: clamp(.55rem,1.2vw,.75rem);
      letter-spacing: .22em; text-transform: uppercase;
      color: rgba(245,234,216,0);
      background: rgba(10,6,2,.6);
      padding: .45rem 1.1rem; border-radius: 4px;
      border: 1px solid rgba(201,169,110,0);
      white-space: nowrap;
      transition: all .4s ease;
      pointer-events: none;
    }
    #shelf-trigger:hover {
      background: rgba(255,210,80,.07);
      box-shadow: inset 0 0 60px rgba(255,180,40,.1), 0 0 80px rgba(255,160,20,.07);
    }
    #shelf-trigger:hover::after {
      color: rgba(245,234,216,.9);
      border-color: rgba(201,169,110,.45);
      transform: translateX(-50%) translateY(0);
    }
    .home-title-block {
      position: absolute; bottom: 4%; left: 50%;
      transform: translateX(-50%);
      text-align: center; pointer-events: none;
      animation: fadeUp .8s var(--ease) both;
      white-space: nowrap;
    }
    #home-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.8rem);
      font-weight: 400; color: var(--gold-lt);
      letter-spacing: .06em; line-height: 1.2;
      text-shadow: 0 2px 20px rgba(0,0,0,.9);
    }
    #home-title em { font-style: italic; }
    #home-sub {
      font-size: clamp(.7rem, 1.2vw, .88rem);
      color: rgba(245,234,216,.6);
      letter-spacing: .18em; font-style: italic;
      text-shadow: 0 1px 8px rgba(0,0,0,.9);
      margin-top: .3rem;
    }
    .user-pill {
      position:fixed; top:1.2rem; right:1.4rem;
      display:flex; align-items:center; gap:.6rem;
    }
    #user-name {
      font-family:'Cinzel',serif; font-size:.6rem;
      letter-spacing:.15em; color:rgba(201,169,110,.45);
      text-transform:uppercase;
    }
    #btn-signout {
      font-family:'Cinzel',serif; font-size:.55rem;
      letter-spacing:.15em; text-transform:uppercase;
      color:rgba(201,169,110,.3);
      border:1px solid rgba(201,169,110,.15);
      border-radius:3px; padding:.3rem .6rem;
      transition:all .2s;
    }
    #btn-signout:hover { color:var(--gold); border-color:var(--gold-dim); }

    /* ════════════════════════════════════════════════
       PANTALLA 2 — CATÁLOGO (ESTANTERÍA)
    ════════════════════════════════════════════════ */
    #screen-catalog {
      background:
        linear-gradient(180deg, var(--bg) 0%, var(--wood) 100%);
      align-items:stretch; overflow:hidden;
    }
    .shelf-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1.6rem .7rem;
      border-bottom:1px solid rgba(201,169,110,.1);
      flex-shrink:0;
    }
    #btn-back {
      font-family:'Cinzel',serif; font-size:.6rem;
      letter-spacing:.2em; text-transform:uppercase;
      color:rgba(201,169,110,.5);
      border:1px solid rgba(201,169,110,.15);
      border-radius:3px; padding:.35rem .7rem;
      transition:all .2s;
    }
    #btn-back:hover { color:var(--gold); border-color:var(--gold-dim); }
    .shelf-title {
      font-family:'Cinzel',serif; font-size:.7rem;
      letter-spacing:.28em; text-transform:uppercase;
      color:rgba(201,169,110,.4);
    }
    .shelf-scroll {
      flex:1; overflow-y:auto; padding:1.8rem 1.4rem 2.4rem;
      scrollbar-width:thin; scrollbar-color:rgba(201,169,110,.2) transparent;
    }
    .shelf-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:2rem 1.6rem;
    }
    .stage-slot { display:flex; flex-direction:column; align-items:center; gap:.6rem; }

    /* Libro 3D en estantería */
    .book-mini {
      width:90px; height:130px;
      position:relative; cursor:pointer;
      transform-style:preserve-3d;
      transition:transform .3s var(--spring), filter .3s;
      transform:rotateY(-10deg) rotateX(3deg);
    }
    .book-mini:hover { transform:rotateY(0deg) rotateX(0deg) translateY(-6px) scale(1.04); filter:drop-shadow(0 12px 20px rgba(0,0,0,.6)); }
    .book-mini .bm-spine {
      position:absolute; left:0; top:0; width:14px; height:100%;
      background:linear-gradient(180deg,#3a2a0e,#1e1506,#3a2a0e);
      border-radius:2px 0 0 2px;
      transform-origin:left center;
    }
    .book-mini .bm-cover {
      position:absolute; left:14px; top:0; right:0; bottom:0;
      border-radius:0 3px 3px 0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .book-mini .bm-cover img {
      width:100%; height:100%; object-fit:cover; opacity:.85;
    }
    .book-mini .bm-cover .bm-label {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(180deg,rgba(10,7,2,.3) 0%,rgba(10,7,2,.6) 100%);
      padding:.4rem;
    }
    .bm-num {
      font-family:'Playfair Display',serif;
      font-size:1.8rem; color:var(--gold-lt);
      font-weight:700; line-height:1;
    }
    .bm-year {
      font-family:'Cinzel',serif; font-size:.5rem;
      color:rgba(245,234,216,.5); letter-spacing:.1em; margin-top:.2rem;
    }
    .stage-name-input {
      background:none; border:none; border-bottom:1px solid transparent;
      text-align:center; color:rgba(245,234,216,.55);
      font-size:.78rem; font-family:'Cormorant Garamond',serif;
      font-style:italic; width:110px;
      transition:border-color .2s, color .2s;
      padding:.1rem .2rem;
    }
    .stage-name-input:hover, .stage-name-input:focus {
      border-bottom-color:var(--gold-dim); color:var(--parchment);
      outline:none;
    }
    .loading-shelf {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100%; gap:1rem;
    }
    .spinner {
      width:32px; height:32px;
      border:2px solid rgba(201,169,110,.12);
      border-top-color:var(--gold);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    .loading-shelf p {
      font-family:'Cinzel',serif; font-size:.62rem;
      letter-spacing:.22em; text-transform:uppercase;
      color:rgba(201,169,110,.35);
    }

    /* ════════════════════════════════════════════════
       PANTALLA 3 — LIBRO (FLIP 3D)
    ════════════════════════════════════════════════ */
    #screen-book {
      background:var(--bg);
      padding:1rem; gap:.8rem;
    }
    .book-nav-bar {
      display:flex; align-items:center; gap:1rem;
      flex-shrink:0;
    }
    #btn-book-back {
      font-family:'Cinzel',serif; font-size:.58rem;
      letter-spacing:.18em; text-transform:uppercase;
      color:rgba(201,169,110,.45);
      border:1px solid rgba(201,169,110,.15);
      border-radius:3px; padding:.32rem .65rem;
      transition:all .2s;
    }
    #btn-book-back:hover { color:var(--gold); border-color:var(--gold-dim); }
    #book-stage-label {
      font-family:'Cinzel',serif; font-size:.65rem;
      letter-spacing:.2em; text-transform:uppercase;
      color:rgba(201,169,110,.38);
    }

    /* Libro */
    .book-3d {
      flex:1; width:100%; max-width:720px;
      perspective:1400px;
      display:flex; align-items:stretch; justify-content:center;
      position:relative;
    }
    .book-pages {
      width:min(680px,90vw); height:min(500px,65vh);
      position:relative;
      transform-style:preserve-3d;
    }
    /* Página (dos caras) */
    .page {
      position:absolute; inset:0;
      transform-style:preserve-3d;
      transition:transform .75s cubic-bezier(.4,0,.2,1);
      transform-origin:left center;
    }
    .page.flipped { transform:rotateY(-180deg); }
    .page-face {
      position:absolute; inset:0;
      backface-visibility:hidden;
      border-radius:3px;
      overflow:hidden;
      box-shadow:2px 0 8px rgba(0,0,0,.5);
    }
    .page-back {
      transform:rotateY(180deg) scaleX(-1);
    }

    /* Portada */
    .cover-page {
      background:linear-gradient(135deg,#1e1506 0%,#2d1e08 50%,#1a1005 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:.8rem; padding:2rem;
      border:1px solid rgba(201,169,110,.15);
    }
    .cover-ornament { font-size:.9rem; color:var(--gold-dim); letter-spacing:.6em; }
    .cover-num {
      font-family:'Playfair Display',serif;
      font-size:clamp(4rem,12vw,7rem);
      color:var(--gold-lt); font-weight:700; line-height:1;
    }
    .cover-year {
      font-family:'Cinzel',serif; font-size:.9rem;
      letter-spacing:.3em; color:rgba(201,169,110,.55);
    }
    .cover-title {
      font-family:'Playfair Display',serif;
      font-size:1.1rem; font-style:italic;

    /* Páginas de foto */
    .photo-page { background:#0a0703; }
    .photo-page img {
      width:100%; height:100%; object-fit:contain;
    }
    .photo-page .caption {
      position:absolute; bottom:0; left:0; right:0;
      padding:.5rem 1rem;
      background:linear-gradient(transparent,rgba(0,0,0,.7));
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:.75rem; color:rgba(245,234,216,.45);
      text-align:center;
    }

    /* Página vacía */
    .blank-page {
      background:var(--parchment);
      display:flex; align-items:center; justify-content:center;
    }
    .blank-page .blank-inner {
      width:80%; height:80%;
      border:1px solid rgba(44,31,14,.15);
      display:flex; align-items:center; justify-content:center;
    }
    .blank-ornament {
      color:rgba(44,31,14,.1); font-size:3rem;
      font-family:'Playfair Display',serif; font-style:italic;
    }

    /* Controles de página */
    .page-controls {
      display:flex; align-items:center; gap:1.2rem;
      flex-shrink:0; padding:.2rem 0 .4rem;
    }
    .nav-btn {
      width:40px; height:40px; border-radius:50%;
      border:1px solid rgba(201,169,110,.25);
      color:var(--gold); font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      transition:all .25s;
    }
    .nav-btn:hover:not(:disabled) { background:rgba(201,169,110,.1); border-color:var(--gold); }
    .nav-btn:disabled { opacity:.2; cursor:default; }
    .page-info {
      font-family:'Cinzel',serif; font-size:.62rem;
      letter-spacing:.2em; color:rgba(201,169,110,.4);
      min-width:80px; text-align:center;
    }

    /* ────────────────────────────────────────────────
       RESPONSIVE
    ──────────────────────────────────────────────── */
    @media(max-width:560px){
      .setup-card { padding:1.6rem 1.4rem; }
      .row2 { grid-template-columns:1fr; }
      .shelf-grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
      .book-mini { width:76px; height:110px; }
    }
  </style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════════════
   ESTADO GLOBAL
═══════════════════════════════════════════════════ */
const GOOGLE_CLIENT_ID = '545250330130-hd9vqfa4fku0coqkas7rnbvkhkaip5bo.apps.googleusercontent.com';
const cfg = { clientId: GOOGLE_CLIENT_ID, folder:'LA', sort:'date', personName:'' };
let accessToken = null;
let stages      = [];
let stageNames  = {};
let currentStage= null;
let currentPage = 0;
let pages       = [];

/* ═══════════════════════════════════════════════════
   NAVEGACIÓN DE PANTALLAS
═══════════════════════════════════════════════════ */
function show(id){
  ['screen-setup','screen-home','screen-catalog','screen-book'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

document.getElementById('shelf-trigger').addEventListener('click',  ()=>show('screen-catalog'));
document.getElementById('shelf-trigger').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); show('screen-catalog'); }});
document.getElementById('btn-back').addEventListener('click',        ()=>show('screen-home'));
document.getElementById('btn-book-back').addEventListener('click',   ()=>show('screen-catalog'));
document.getElementById('btn-signout').addEventListener('click',     ()=>{ try{ google.accounts.oauth2.revoke(accessToken, ()=>{}); }catch(e){} location.reload(); });

/* ═══════════════════════════════════════════════════
   CONEXIÓN GOOGLE OAUTH2
═══════════════════════════════════════════════════ */
document.getElementById('btn-connect').addEventListener('click', async () => {
  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.innerHTML = '<span style="display:flex;align-items:center;justify-content:center;gap:.5rem;"><div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> Conectando…</span>';
  clearErr();

  try {
    await ensureGapiLoaded();
    const token = await requestGoogleToken(cfg.clientId);
    accessToken = token;

    const me = await driveGet('https://www.googleapis.com/oauth2/v2/userinfo');
    const firstName = (me.name || '').split(' ')[0] || '';

    document.getElementById('home-title').innerHTML = `Nuestro <em>Amor</em>`;
    document.getElementById('home-sub').textContent  = 'Un año, un capítulo';
    document.getElementById('user-name').textContent = me.name || me.email || '';

    stageNames = JSON.parse(localStorage.getItem('stage-names')||'{}');

    show('screen-home');
    loadStageIndex();
  } catch(err) {
    showErr('Error al conectar: ' + (err.message || err));
    btn.disabled = false;
    btn.innerHTML = '<span style="display:flex;align-items:center;justify-content:center;gap:.7rem;"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>Entrar con Google</span>';
  }
});

function showErr(msg){ const e=document.getElementById('setup-err'); e.textContent=msg; e.classList.add('show'); }
function clearErr()  { document.getElementById('setup-err').classList.remove('show'); }

/* ═══════════════════════════════════════════════════
   CARGA DE GAPI
═══════════════════════════════════════════════════ */
function ensureGapiLoaded(){
  return new Promise((res,rej)=>{
    if(window.gapi && window.google && window.google.accounts){
      res(); return;
    }
    // Esperar a que los scripts async de Google terminen de cargar
    let tries = 0;
    const t = setInterval(()=>{
      tries++;
      if(window.google && window.google.accounts){ clearInterval(t); res(); }
      if(tries > 60){ clearInterval(t); rej(new Error('Timeout cargando Google APIs')); }
    }, 200);
  });
}

/* ═══════════════════════════════════════════════════
   OAUTH TOKEN (popup)
═══════════════════════════════════════════════════ */
function requestGoogleToken(clientId){
  return new Promise((res,rej)=>{
    const client = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
      callback: (resp)=>{
        if(resp.error){ rej(new Error(resp.error)); }
        else           { res(resp.access_token); }
      }
    });
    client.requestAccessToken({ prompt:'consent' });
  });
}

/* ═══════════════════════════════════════════════════
   HELPER FETCH GOOGLE APIS
═══════════════════════════════════════════════════ */
async function driveGet(url){
  const r = await fetch(url, { headers:{ Authorization:`Bearer ${accessToken}` } });
  if(!r.ok){ const t=await r.text(); throw new Error(`${r.status}: ${t}`); }
  return r.json();
}

async function driveList(params){
  const qs = new URLSearchParams(params).toString();
  return driveGet(`https://www.googleapis.com/drive/v3/files?${qs}`);
}

/* ═══════════════════════════════════════════════════
   CARGA DEL ÍNDICE DE ETAPAS
   Lee subcarpetas numéricas dentro de la carpeta raíz
═══════════════════════════════════════════════════ */
async function loadStageIndex(){
  const grid    = document.getElementById('shelf-grid');
  const loading = document.getElementById('shelf-loading');
  grid.style.display = 'none';
  loading.style.display = 'flex';

  try {
    // 1. Buscar carpeta raíz por nombre
    const rootResult = await driveList({
      q: `name='${cfg.folder}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: 'files(id,name)',
      pageSize: 5
    });
    if(!rootResult.files.length) throw new Error(`No se encontró la carpeta "${cfg.folder}" en tu Google Drive.`);
    const rootId = rootResult.files[0].id;

    // 2. Listar subcarpetas numéricas
    const subResult = await driveList({
      q: `'${rootId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: 'files(id,name)',
      pageSize: 200
    });
    const numeric = subResult.files
      .filter(f=> /^\d+$/.test(f.name.trim()))
      .sort((a,b)=> parseInt(a.name)-parseInt(b.name));

    if(!numeric.length) throw new Error(`No se encontraron subcarpetas numéricas dentro de "${cfg.folder}".`);

    // 3. Para cada etapa, cargar la primera foto (para miniatura)
    stages = [];
    await Promise.all(numeric.map(async f=>{
      const num  = parseInt(f.name);

      // Primera imagen como thumbnail
      let thumb = null;
      const imgs = await driveList({
        q: `'${f.id}' in parents and mimeType contains 'image/' and trashed=false`,
        fields: 'files(id,name,thumbnailLink,imageMediaMetadata)',
        orderBy: 'name',
        pageSize: 1
      });
      if(imgs.files.length) thumb = imgs.files[0].thumbnailLink;

      stages.push({ id:f.id, num, thumb, name:f.name });
    }));
    stages.sort((a,b)=>a.num-b.num);

    renderShelf();
    loading.style.display  = 'none';
    grid.style.display     = 'grid';
  } catch(err){
    loading.innerHTML = `<p style="color:#e88;max-width:340px;text-align:center;line-height:1.6;">${err.message}</p>`;
  }
}

/* ═══════════════════════════════════════════════════
   RENDERIZAR ESTANTERÍA
═══════════════════════════════════════════════════ */
function renderShelf(){
  const grid = document.getElementById('shelf-grid');
  grid.innerHTML = '';

  stages.forEach(stage=>{
    const savedName = stageNames[stage.id] || '';

    const slot = document.createElement('div');
    slot.className = 'stage-slot';

    const book = document.createElement('div');
    book.className = 'book-mini';
    book.setAttribute('role','button');
    book.setAttribute('tabindex','0');
    book.setAttribute('aria-label',`Año ${stage.num}`);

    book.innerHTML = `
      <div class="bm-spine"></div>
      <div class="bm-cover">
        ${stage.thumb ? `<img src="${stage.thumb}" alt="Foto etapa ${stage.num}" loading="lazy" />` : ''}
        <div class="bm-label">
          <span class="bm-num">${stage.num}</span>
        </div>
      </div>`;

    book.addEventListener('click',  ()=>openBook(stage));
    book.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openBook(stage); }});

    const nameInput = document.createElement('input');
    nameInput.type        = 'text';
    nameInput.className   = 'stage-name-input';
    nameInput.placeholder = `Año ${stage.num}`;
    nameInput.value       = savedName;
    nameInput.title       = 'Haz clic para editar el nombre de esta etapa';
    nameInput.addEventListener('change', ()=>{
      stageNames[stage.id] = nameInput.value;
      localStorage.setItem('stage-names', JSON.stringify(stageNames));
    });
    nameInput.addEventListener('click', e=>e.stopPropagation());

    slot.appendChild(book);
    slot.appendChild(nameInput);
    grid.appendChild(slot);
  });
}

/* ═══════════════════════════════════════════════════
   ABRIR LIBRO (FLIP 3D)
═══════════════════════════════════════════════════ */
async function openBook(stage){
  show('screen-book');
  document.getElementById('book-stage-label').textContent =
    stageNames[stage.id] ? `${stageNames[stage.id]} · Año ${stage.num}` : `Año ${stage.num}`;

  const container = document.getElementById('book-pages');
  container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;"><div class="spinner"></div></div>';

  currentPage = 0;
  currentStage = stage;

  try {
    // Cargar todas las fotos de la etapa
    let orderBy = 'name';
    if(cfg.sort==='date')      orderBy='createdTime';
    if(cfg.sort==='date-desc') orderBy='createdTime desc';

    const result = await driveList({
      q: `'${stage.id}' in parents and mimeType contains 'image/' and trashed=false`,
      fields: 'files(id,name,createdTime,thumbnailLink)',
      orderBy,
      pageSize: 200
    });

    const photos = result.files;
    buildBook(stage, photos);
  } catch(err){
    container.innerHTML = `<p style="color:#e88;padding:2rem;text-align:center;">${err.message}</p>`;
  }
}

/* ═══════════════════════════════════════════════════
   CONSTRUIR LIBRO
═══════════════════════════════════════════════════ */
function buildBook(stage, photos){
  const container = document.getElementById('book-pages');
  container.innerHTML = '';
  pages = [];

  // Página 0: portada
  const cover = makePage('cover', stage);
  container.appendChild(cover);
  pages.push(cover);

  // Páginas de fotos
  photos.forEach((photo, i)=>{
    const p = makePage('photo', stage, photo, i+1);
    container.appendChild(p);
    pages.push(p);
  });

  // Contraportada
  const back = makePage('back', stage);
  container.appendChild(back);
  pages.push(back);

  currentPage = 0;
  renderPage();
}

function makePage(type, stage, photo=null, idx=null){
  const wrap = document.createElement('div');
  wrap.className = 'page';
  wrap.style.zIndex = 0;

  // Cara frontal
  const front = document.createElement('div');
  front.className = 'page-face';

  // Cara trasera (la página anterior / blank)
  const back = document.createElement('div');
  back.className = 'page-face page-back';

  if(type==='cover'){
    front.className += ' cover-page';
    const customName = stageNames[stage.id] || '';
    front.innerHTML = `
      <div class="cover-ornament">♡ ✦ ♡</div>
      <div class="cover-num">${stage.num}</div>
      <div class="cover-title" style="font-size:.9rem;color:rgba(201,169,110,.5);letter-spacing:.2em;font-family:'Cinzel',serif;font-style:normal;">AÑO</div>
      ${customName ? `<div class="cover-title">${customName}</div>` : ''}
      <div class="cover-ornament" style="margin-top:.5rem">♡ ✦ ♡</div>`;
    back.className += ' blank-page';
    back.innerHTML = '<div class="blank-inner"><div class="blank-ornament">∞</div></div>';
  } else if(type==='photo'){
    front.className += ' photo-page';
    // Cargar imagen a través del proxy de Google (thumbnail de alta res)
    const src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w1600`;
    front.innerHTML = `<img src="${src}" alt="Foto ${idx}" loading="lazy" /><div class="caption">${photo.name.replace(/\.[^.]+$/,'')}</div>`;
    back.className += ' blank-page';
    back.innerHTML = '<div class="blank-inner"><div class="blank-ornament">∞</div></div>';
  } else {
    // Contraportada
    front.className += ' cover-page';
    front.innerHTML = `<div class="cover-ornament">♡ ✦ ♡</div><div class="cover-title" style="font-size:1.4rem;margin-top:1rem;color:rgba(201,169,110,.4);font-style:italic;">y seguimos…</div>`;
    back.className += ' blank-page';
    back.innerHTML = '<div class="blank-inner"><div class="blank-ornament">∞</div></div>';
  }

  wrap.appendChild(front);
  wrap.appendChild(back);
  return wrap;
}

function renderPage(){
  const total = pages.length;
  pages.forEach((p, i)=>{
    if(i < currentPage){
      p.classList.add('flipped');
      p.style.zIndex = i;
    } else {
      p.classList.remove('flipped');
      p.style.zIndex = total - i;
    }
  });

  document.getElementById('page-info').textContent =
    `${currentPage + 1} / ${total}`;
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = currentPage === total - 1;
}

document.getElementById('btn-next').addEventListener('click', ()=>{
  if(currentPage < pages.length-1){ currentPage++; renderPage(); }
});
document.getElementById('btn-prev').addEventListener('click', ()=>{
  if(currentPage > 0){ currentPage--; renderPage(); }
});

/* Teclas de teclado */
document.addEventListener('keydown', e=>{
  if(document.getElementById('screen-book').classList.contains('hidden')) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){ document.getElementById('btn-next').click(); }
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  { document.getElementById('btn-prev').click(); }
});
</script>
